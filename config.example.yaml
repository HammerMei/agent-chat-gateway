# yaml-language-server: $schema=https://raw.githubusercontent.com/HammerMei/agent-chat-gateway/main/gateway/schema/config.schema.json
# agent-chat-gateway — example configuration
# Copy this file to config.yaml and adjust to your setup.
#
# Secrets (passwords, tokens) go directly in this file as plain values below —
# config.yaml is chmod'd 0600 automatically (by the config TUI on every save,
# and by `agent-chat-gateway start`), so this is safe as long as you don't
# commit your filled-in copy to version control.
#
# $VAR / ${VAR} is NOT expanded — a value that happens to look like one is
# used exactly as written, like any other string. (If you're upgrading from
# an older setup that used a `.env` file with $VAR references, the next
# `agent-chat-gateway start` — or opening `agent-chat-gateway config` —
# migrates those into literal values here automatically, one-time.)
#
# ── Format notes (v0.2+) ──────────────────────────────────────────────────────
# This example uses the compact config format: top-level `connector_defaults:` /
# `agent_defaults:` / `watcher_defaults:` blocks that deep-merge into every entry
# (the entry always wins on conflict), named `tool_presets:` you can reference by
# name from any agent's tool allow-lists, and `rooms:` to bind one connector+agent
# pair to many rooms without repeating the whole entry. None of this is required —
# a single connector/agent/watcher setup barely needs it — but it keeps larger,
# multi-bot deployments from becoming hundreds of near-duplicate lines. See
# docs/migration-0.2.md if you're upgrading an older config.yaml.

# ── Named tool-rule presets (optional) ────────────────────────────────────────
# Reference a preset by name anywhere a tool-rule list is expected
# (owner_allowed_tools / guest_allowed_tools). String items = preset names,
# dict items = inline rules — the two forms can be freely mixed in one list.
# A preset itself must be a flat list of inline rules (no preset-of-presets).
tool_presets:
  readonly-builtins:
    - tool: "Read"
    - tool: "Glob"
    - tool: "Grep"
    - tool: "WebSearch"

connectors:
  # ── Voice Gateway (Siri / iOS Shortcuts) ─────────────────────────────────
  # Exposes a plain-text HTTP endpoint so any ACG-connected agent can be
  # reached via Siri. iOS Shortcut: Dictate → POST /ask → Speak Text.
  #
  # Security: set 'secret' to a strong random token and configure your router
  # to only allow your iPhone's IP to reach this port, or put it behind a VPN.
  #
  # - name: siri-voice
  #   type: voice
  #   port: 8765                     # HTTP port the gateway listens on
  #   host: "0.0.0.0"               # bind address (default: all interfaces)
  #   secret: "your-strong-random-token"  # Bearer token required in Authorization header
  #   timeout: 45                    # seconds to wait for agent reply
  #
  # ⚠️  IMPORTANT — permissions for voice agents:
  # With permissions.enabled: true and skip_owner_approval: false, any tool not in
  # owner_allowed_tools triggers a human-in-the-loop approval request — but there
  # is no human on the other end of a voice call to approve it.  The request hangs
  # until timeout, and the caller hears "request timed out."
  # For voice agents, use ONE of:
  #   a) permissions.enabled: false         — disables the broker entirely (simplest)
  #   b) skip_owner_approval: true          — auto-approves all owner tool calls
  #      (requires permissions.enabled: true; guests are still subject to allow-lists)
  # Gate access at the network level (VPN / firewall) to compensate.

  - name: rc-home                    # unique name for this connector (used in CLI commands)
    type: rocketchat
    server:
      url: "https://chat.example.com"
      username: "your-bot-username"
      password: "your-bot-password"
    allowed_users:
      owners:
        - your-admin-username        # full access: can use all tools, approve/deny requests
      guests: []                     # read-only access: limited to allowed tools only
        # - alice
        # - bob
    attachments:
      max_file_size_mb: 10           # files larger than this are skipped (0 = no limit)
      download_timeout: 30           # seconds per file download
      # cache_dir_global: ~/.agent-chat-gateway/attachments  # optional: override download cache location
    reply_in_thread: false           # true = start a new thread for every top-level reply
    permission_reply_in_thread: true # false = post permission notifications at room level

    # ── Timezone ─────────────────────────────────────────────────────────────
    # IANA timezone for this connector.  Used to format message timestamps in
    # the agent prompt header and as the default timezone for scheduled tasks
    # created against this connector's watchers.
    # Falls back to the ACG server's local timezone when omitted.
    # Examples: "America/Los_Angeles", "Asia/Taipei", "Europe/London", "UTC"
    # timezone: "America/Los_Angeles"

    # ── Message filtering ─────────────────────────────────────────────────────
    # require_mention: true (default) — in channels/groups, bot only responds when
    #   explicitly @mentioned.  Set to false to listen to all messages without mention.
    #   DMs always pass regardless of this setting.
    # require_mention: true

    # filter_sender: true (default) — only users listed in allowed_users.owners +
    #   allowed_users.guests may interact.  Set to false to allow anyone to send messages
    #   (role defaults to 'guest' for unlisted users).
    # filter_sender: true

    # ── Agent-to-agent loop protection ───────────────────────────────────────
    # Enables controlled agent-to-agent communication when two ACG bots share a room.
    # Without this, bots responding to each other create infinite loops.
    #
    # How it works (three layers):
    #   1. LLM self-termination — the agent responds with a special token to stop
    #      the chain early when it detects a loop or has nothing to add.
    #   2. Per-sender turn budget — hard ceiling on how many turns each agent can take
    #      before messages are force-dropped.
    #   3. TTL expiry — stale counters are garbage-collected automatically.
    #
    # The turn budget is tracked independently per sender, so two different bot pairs
    # in the same room don't share quotas.
    #
    # Counter resets:
    #   - When the LLM self-terminates (token detected)
    #   - When the turn limit is hit (force-drop)
    #   - When a human message arrives (resets all agent counters for that room/thread)
    #   - After ttl_seconds of inactivity (TTL GC)
    #
    # agent_chain:
    #   agent_usernames:               # RC usernames of other ACG bots this bot may receive messages from
    #     - laomei-bot                 # messages from these senders bypass the allow-list check
    #     - xiaomei-bot                # and are tracked against their own per-sender turn budget
    #   max_turns: 5                   # max turns per agent per room/thread before force-drop (default: 5)
    #   ttl_seconds: 3600              # seconds before idle turn counters are GC'd (default: 3600)

    # Built-in context files are injected automatically — no config needed:
    #   contexts/rc-gateway-context.md  — RC message format, RBAC rules, injection protection
    #   contexts/tool-index-context.md  — short index for lazy-loaded ACG instruction docs
    #   contexts/scheduling-context.md + fetch-history-context.md are injected instead
    #                                      when an agent sets lazy_instruction_loading: false
    #
    # Add your own files below to extend agent behavior (e.g. room-specific personas,
    # project context, or custom instructions).  Listed files are injected AFTER the
    # built-in files, so they can override or extend any defaults.
    context_inject_files: []          # connector-level user context (layer 1); add paths here

agents:
  # ── Claude backend ────────────────────────────────────────────────────────
  my-agent:
    type: claude
    command: claude
    working_directory: ~/.agent-chat-gateway/work  # required: directory where the agent runs and creates files
    new_session_args: []             # extra flags passed only on session creation
                                     # e.g. ["--agent", "my-agent-name"] to load a custom agent
    session_prefix: agent-chat       # prefix added to Claude session titles
    lazy_instruction_loading: true   # true = inject short tool index; false = inject full scheduling/history docs
    context_inject_files: []         # agent-level context files (layer 2); list, resolved relative to config dir

    # ── Tool allow lists ───────────────────────────────────────────────────
    # Each entry is either:
    #   - a string naming a `tool_presets:` entry defined above (expanded in place), or
    #   - an inline object with:
    #       tool:   (required) regex matched against the tool name
    #       params: (optional) regex matched against the tool's primary parameter:
    #                 Bash        → tool_input["command"]   (Claude) / patterns[0] (OpenCode)
    #                 WebFetch    → tool_input["url"]        (Claude) / patterns[0] (OpenCode)
    #                 Read/Edit/
    #                 Write       → tool_input["file_path"]  (Claude) / patterns[0] (OpenCode)
    #                 unknown/MCP → full tool_input serialized as JSON (Claude) / patterns[0] (OpenCode)
    # The two forms may be freely mixed; list order is preserved.
    #
    # owner_allowed_tools: auto-approved for owners — no RC notification sent.
    #   Anything NOT matched here triggers the human-in-the-loop approval flow.
    #   Omit this key (or leave empty) to require approval for every tool call.
    #
    # guest_allowed_tools: auto-approved for guests — no RC notification sent.
    #   Anything NOT matched here is auto-denied without notifying the owner.

    owner_allowed_tools:
      # ── Built-in gateway commands (auto-included — no config needed) ────
      # These are ALWAYS auto-approved for owners, regardless of what you list here:
      #   agent-chat-gateway send ...      — send messages / attach files to RC rooms
      #   agent-chat-gateway schedule ...  — create/list/delete/pause/resume scheduled jobs
      #   agent-chat-gateway fetch-history ... — read filtered channel history
      #   agent-chat-gateway instructions ...  — read bundled tool instructions

      # ── Read-only built-in tools: preset defined above, safe, never need approval ──
      - readonly-builtins

      # ── WebFetch: restrict by domain ───────────────────────────────────
      # params regex is matched against the full URL (tool_input["url"]).
      # ⚠️  SECURITY: avoid ".*" as params — it allows fetching internal network
      # addresses (localhost, 127.0.0.1, 169.254.169.254 AWS metadata, etc.).
      # Always use explicit domain patterns to prevent SSRF attacks.
      - tool: "WebFetch"
        params: "https?://(www\\.)?github\\.com/.*"
      - tool: "WebFetch"
        params: "https?://[^/]*\\.wikipedia\\.org/.*"

      # ── Bash: allow specific safe commands only ─────────────────────────
      # params regex is matched against tool_input["command"]
      - tool: "Bash"
        params: "git (log|diff|status|show)( .*)?"   # read-only git commands
      - tool: "Bash"
        params: "ls( .*)?"                           # directory listing

      # ── MCP tools: match by server or specific tool name ───────────────
      # params regex (if set) is matched against full tool_input JSON string
      - tool: "mcp__rocketchat__get_.*"              # all read-only RC tools
      - tool: "mcp__rocketchat__list_.*"
      - tool: "mcp__github__.*"                      # all GitHub MCP tools
        params: ".*\"action\":\\s*\"(get|list|read)\".*"  # read-only actions only

    guest_allowed_tools:
      # Guests get a smaller subset — typically read-only tools only.
      # Presets and inline rules mix freely, same as owner_allowed_tools above.
      - readonly-builtins
      - tool: "WebFetch"
        params: "https?://[^/]*\\.wikipedia\\.org/.*"  # guests: Wikipedia only
      - tool: "mcp__rocketchat__get_.*"
      - tool: "Bash"
        params: "agent-chat-gateway\\s+send\\s+.*"     # agent-initiated file/message send to RC

    timeout: 360                     # seconds to wait for agent response; must be > permissions.timeout
    permissions:
      enabled: true                  # true = human-in-the-loop tool approval via chat
      timeout: 300                   # seconds before unanswered requests are auto-denied
      # skip_owner_approval: false   # ⚠️  CAUTION: when set to true, ALL owner tool calls are
                                     #    auto-approved without any RC notification or confirmation.
                                     #    This disables the human-in-the-loop approval flow entirely
                                     #    for owners. Only enable this when running inside a trusted
                                     #    sandbox where interactive approval is not practical.
                                     #    Guests are still subject to their tool allow-list restrictions.
                                     #    Requires permissions.enabled=true to have any effect.
                                     #    Default: false

  # ── OpenCode backend (uncomment to use) ───────────────────────────────────
  # opencode-agent:
  #   type: opencode
  #   command: opencode
  #   new_session_args: []
  #   working_directory: /path/to/project  # cwd for `opencode serve` — must contain .opencode/opencode.json
  #   session_prefix: agent-chat
  #   context_inject_files:
  #     - contexts/rc-gateway-context.md
  #
  #   # Same format as Claude — broker normalizes tool_input differences internally.
  #   # params regex is always matched against patterns[0] from the SSE permission event.
  #   owner_allowed_tools:
  #     - tool: "Read"
  #     - tool: "Glob"
  #     - tool: "Grep"
  #     - tool: "bash"                       # note: opencode uses lowercase tool names
  #       params: "git (log|diff|status).*"
  #     - tool: "webfetch"
  #       params: "https?://[^/]*\\.github\\.com/.*"
  #     - tool: "bash"
  #       params: "agent-chat-gateway\\s+send\\s+.*"  # agent-initiated file/message send to RC
  #   guest_allowed_tools:
  #     - tool: "read"
  #     - tool: "glob"
  #     - tool: "grep"
  #     - tool: "bash"
  #       params: "agent-chat-gateway\\s+send\\s+.*"  # agent-initiated file/message send to RC
  #
  #   timeout: 360
  #   permissions:
  #     enabled: true
  #     timeout: 300

watchers:
  # ── Watcher definitions ───────────────────────────────────────────────────
  # Each watcher binds a connector room to an agent.
  # Watchers start automatically at gateway startup — no add-watcher command needed.
  #
  # CLI controls:
  #   agent-chat-gateway list                  — show all watchers and their status
  #   agent-chat-gateway pause  <watcher-name> — stop processing messages temporarily
  #   agent-chat-gateway resume <watcher-name> — re-enable a paused watcher
  #   agent-chat-gateway reset  <watcher-name> — clear runtime state, start a fresh session
  #
  # room / rooms:
  #   room: "general"            — exactly one room; same as rooms: [general].
  #   rooms: [general, "@alice"] — bind this connector+agent pair to several rooms at once.
  #                                 Expands into one watcher per room at load time.
  #
  # name (optional):
  #   Only allowed when the entry has exactly one room. If omitted, the watcher name is
  #   auto-derived as "<connector>-<room>" (DM rooms like "@alice" become "<connector>-dm-alice").
  #   Watcher names are persistent identifiers (state.json sessions, CLI pause/resume/reset,
  #   attachment/system-prompt file paths) — set an explicit name on any watcher whose session
  #   you want to survive editing the room list. See docs/migration-0.2.md.
  #
  # session_id: same one-room-only restriction as name.
  #   null (or omitted) — gateway auto-creates a session on first start and persists the ID.
  #                        'reset' clears the stored ID so a new session is created next time.
  #   "ses_abc123"      — gateway always connects to this specific session (sticky).
  #                        'reset' does NOT clear sticky session IDs.
  #
  # context_inject_files: optional watcher-level context files (layer 3).
  #   These are injected after connector-level and agent-level files.
  #
  # online_notification / offline_notification: customize the status message posted when
  #   this watcher starts or stops. Supports any text, emoji, or RC markdown.
  #   Default: null (no message). Set explicitly (or via watcher_defaults, below) to enable.
  #
  # description: optional free-text note (also supported on connectors, agents, and every
  #   *_defaults block). Purely informational — ignored at runtime, never validated — meant
  #   for you (and the config TUI, once it lands) to leave a human-readable note in place of
  #   a YAML comment on things that get regenerated by tooling.

  # ── Voice watcher (pairs with the siri-voice connector above) ───────────
  # - connector: siri-voice
  #   room: voice-room               # must be "voice-room" (fixed by VoiceConnector)
  #   agent: my-agent
  #   context_inject_files:
  #     - gateway/contexts/voice-context.md  # enforces plain-text, no markdown/emoji for Siri

  - connector: rc-home              # must match a connector name above
    agent: my-agent                 # must match an agent name above
    description: "General channel + the admin's DM"
    rooms:
      - general                     # -> watcher name: rc-home-general
      # - "@your-admin-username"    # -> watcher name: rc-home-dm-your-admin-username

  # - connector: rc-home
  #   room: opencode
  #   agent: opencode-agent

# ── Defaults blocks (optional — most useful with 2+ connectors/agents) ───────
# `connector_defaults:` / `agent_defaults:` / `watcher_defaults:` deep-merge into
# every entry of the matching kind (the entry's own fields always win on conflict;
# lists are replaced wholesale, not appended). This is what keeps a multi-bot
# deployment (one connector + one agent per bot persona, fanned out across many
# rooms) from turning into hundreds of near-duplicate lines. Example shape for a
# fleet of bots sharing the same tool policy and agent-chain settings:
#
# agent_defaults:
#   type: claude
#   command: claude
#   working_directory: ~/.agent-chat-gateway/work
#   owner_allowed_tools: [readonly-builtins]
#   permissions: {enabled: true, timeout: 300}
#
# connector_defaults:
#   type: rocketchat
#   agent_chain:
#     agent_usernames: [laomei-bot, xiaomei-bot]
#
# agents:
#   bot-a-agent: {}                       # inherits everything from agent_defaults
#   bot-b-agent:
#     timeout: 500                        # overrides just this one field
#
# connectors:
#   - name: rc-bot-a
#     server: {url: "https://chat.example.com", username: "bot-a", password: "bot-a-password"}
#   - name: rc-bot-b
#     server: {url: "https://chat.example.com", username: "bot-b", password: "bot-b-password"}
#
# watchers:
#   - {connector: rc-bot-a, agent: bot-a-agent, rooms: [nest, hammer, "@glin"]}
#   - {connector: rc-bot-b, agent: bot-b-agent, rooms: [nest, wave, "@glin"]}
#
# `watcher_defaults:` cannot set name/room/rooms/session_id (those identify a
# specific watcher), but can set shared fields like `agent:` or notifications:
#
# watcher_defaults:
#   online_notification: "✅ _Agent online_"   # restore the pre-0.2 default globally
#   offline_notification: "❌ _Agent offline_"

# ── Scheduler (optional) ──────────────────────────────────────────────────────
# Controls the built-in cron scheduler.  All fields have sensible defaults
# so this entire section can be omitted if you do not use scheduling.
#
# CLI usage:
#   agent-chat-gateway schedule create WATCHER MESSAGE --every 1d --at 09:00
#   agent-chat-gateway schedule list
#   agent-chat-gateway schedule delete JOB_ID
#   agent-chat-gateway schedule pause JOB_ID
#   agent-chat-gateway schedule resume JOB_ID
#
# Jobs are stored in ~/.agent-chat-gateway/data/jobs.json.
# The daemon must be running for schedule commands to work (they use the control socket).

# scheduler:
#   completed_job_ttl_days: 7         # How long completed jobs are kept in data/jobs.json before purge.
#                                     # 0 = delete immediately when a job completes.
#                                     # Use "acg schedule list --all" to see completed jobs.
#
# Note: timezone is now configured per-connector (see "timezone:" under each connector above).
# When --tz is not supplied to "schedule create", the watcher's connector timezone is used,
# falling back to the ACG server's local timezone.

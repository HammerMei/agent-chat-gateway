name: E2E Canary (Latest Agents)

# Runs daily with the latest claude-code and opencode to detect upstream
# breaking changes before they affect production deployments.
#
# Failures here do NOT block merges — they indicate an upstream agent
# change that may require ACG code or context updates.
# Check the run log to identify which agent changed and what broke.

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:       # also triggerable manually

jobs:
  e2e-canary:
    name: E2E Canary — RC + ACG + Claude/OpenCode (latest)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Never block PRs or releases — canary failures are informational
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Start RC + MongoDB (phase 1)
        run: |
          docker compose -f tests/e2e/docker-compose.yml up -d mongodb rocketchat

      - name: Create RC accounts (waits for RC health)
        run: uv run python tests/e2e/setup.py --rc-url http://localhost:3100

      - name: Build ACG image from source (latest agent versions)
        run: |
          docker compose -f tests/e2e/docker-compose.yml build acg

      - name: Start ACG (phase 2)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docker compose -f tests/e2e/docker-compose.yml up -d acg

      - name: Print agent versions (for debugging canary failures)
        run: |
          echo "=== claude-code version ==="
          docker exec acg-e2e claude --version 2>/dev/null || echo "unavailable"
          echo "=== opencode version ==="
          docker exec acg-e2e opencode --version 2>/dev/null || echo "unavailable"

      - name: Run E2E tests
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          E2E_RC_URL: http://localhost:3100
        run: |
          uv run pytest tests/e2e/ -v -s --timeout=180 \
            --ignore=tests/unit --ignore=tests/integration

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== ACG logs ==="
          docker logs acg-e2e --tail 100 || true
          echo "=== RC logs ==="
          docker logs acg-e2e-rocketchat --tail 50 || true

      - name: Teardown
        if: always()
        run: docker compose -f tests/e2e/docker-compose.yml down -v

name: E2E Tests

on:
  # Run manually from GitHub Actions UI only
  # (E2E tests are slow and consume API credits — trigger deliberately)
  workflow_dispatch:

jobs:
  e2e:
    name: E2E — RC + ACG + Claude/OpenCode
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Start RC + MongoDB (phase 1)
        run: |
          docker compose -f tests/e2e/docker-compose.yml up -d mongodb rocketchat

      - name: Create RC accounts (waits for RC health)
        run: uv run python tests/e2e/setup.py --rc-url http://localhost:3100

      - name: Start ACG (phase 2)
        env:
          # Use whichever secret is configured (OAuth token takes precedence)
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docker compose -f tests/e2e/docker-compose.yml up -d acg

      - name: Run E2E tests
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          E2E_RC_URL: http://localhost:3100
        run: |
          uv run pytest tests/e2e/ -v -s --timeout=180 \
            --ignore=tests/unit --ignore=tests/integration

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== ACG logs ==="
          docker logs acg-e2e --tail 100 || true
          echo "=== RC logs ==="
          docker logs acg-e2e-rocketchat --tail 50 || true

      - name: Teardown
        if: always()
        run: docker compose -f tests/e2e/docker-compose.yml down -v
